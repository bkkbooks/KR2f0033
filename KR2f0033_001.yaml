body:
  text: 周忠愍奏疏卷上明周起元撰西臺奏疏題為僕臣利口飾辨大乖名教事疏臣惟士人立身稍有識嚮莫不仰止賢哲豈惟考槃之英不忍當吾世而失之即前修往矣弔古而想見其人猶津津有餘慕焉近見太僕寺少卿徐兆魁與言官抵辨學步王國已屬縱恣矣猶曰自覆其穢迹也乃疏中有偽學之詆古今載籍所列一語臣尤深不滿焉夫詆偽學之見於載籍者非韓伌胄柄政時沈繼祖劉三傑為言官建疏力申偽學禁而蔡元定黃直卿諸儒緣坐貶斥者乎古今載籍多矣兆魁何不摘名教中一二美事言之而獨引此偽學一條以為考信於載籍甘同調於繼祖三傑為也最可恨者楊時羅汝芳等諸儒亦敢肆譏評即就臣少時所識羅汝芳一人言之汝芳學嚴屋漏遵度率軌一言一行為世凖的臣頃閲粵東請諡册內稱原任吏部侍郎楊起元執贄羅先生而稟學焉往復參證因大悟性命之宗又云一聞羅先生之學服膺無須臾忘離雕一小像出必告反必面歲時約同志奠於所祀之居以為常由兹言之是粵之名臣且授業自汝芳以成命世而光地靈兆魁顧妄加譏誚其為粵有識者之共棄可知也夫人有髙出一世之行者而後可以俯品流俗豈以賢者而程材於不肖乎彼直以攻淮撫一節為護身符夫淮撫一人進退何足論哉孫丕揚因沈思孝之故惡淮撫卒不移怒於端人貞士此丕揚之所以為丕揚也兆魁倚王國攻淮撫因而施鉗網之術邀其徒黨謀立四欵之單擊名流於當年甚至誅前修於身後隂嗾攻秦以為利使人角玄黃而已又有術以自固此兆魁之所以為兆魁也只緣以偽學二字橫據胸中故有種種作用凡天下慷慨直節之士為流俗所忌即推入於偽學之門户以錮之略辨明救正即以依傍詆之果行兆魁之説其壞人心術禍人國家豈淺哉李膺范滂意氣蓋亦過於激昻其初只因爭成縉匿張儉一二事而釀成黨禁然千古之評不過曰諸君子激以招禍已耳卒何嘗屈膺滂而直覽節乎以此為衡而邪正可立覆也臣於兆魁無怨而有德獨不忍其沉迷不返姑為點破以俟其悔醒使不終為名教中罪人耳伏乞皇上將臣疏發議果不合公論將臣罷斥以謝兆魁臣不勝惶悚待命之至題為差船屯擁糧艘滯礙乞速完封典以快輿情以通新運事疏臣奉命儹漕計領隨大小材官四百餘員挽運漕軍不啻十萬餘衆臣受事以來兢兢焉惟恐當振刷之後復釀廢弛之漸也竭力催儹凡舊冬奉單運官立令趨事不許在家度歲凡漕軍駕船回南俱促今赴兌不許回衛住泊臣豈事苛峻而不體人情哉無非奉新命之嚴切懼凍阻之重纍期復漕規使轉輸之卒庶幾今冬早回得邀數日寧處也幸官旗各稟約束以次飛挽而進茍非積缺多船不敢自甘殿後日已聨棹揚帆而渡淮邳矣乃近日各軍咸向臣稟云傳聞封船尚集通灣開駕未有定期河道填塞抵灣起剝皆甚不便恐前此拮據徒勞今冬必復阻凍等情夫此十萬漕軍盡有父母兄弟妻子也經嵗勤動彼獨不念其家乎然所以冒霜雪而南歸旋衝風浪而北進絶內顧之念以赴公家之役者何哉誠以期會在前鞭箠在後國儲綦重阻凍艱難是以割恩愛捐私戀奉功令備勞瘁而不辭也漕河水程四千餘里即甚疏利尚虞或決或淺或風或雨不能刻日轉粟以登大廪況復加以千艘之攔壅萬役之喧擠寧無滯礙此六七省運卒豈私憂過計也耶先是布分封之旨合漕員役莫不歡欣色動此軍士忠於國家之公願也兹者稽啓行之期合漕員役又莫不相對憂惶此軍士自慮阻滯之隱情也陛下奈何停閣此必不容已之典章以拂天下之公願而不恤軍士之隱情乎哉夫藩服世爵榮莫逾焉衆建維城典莫重焉朝家舉動非士庶比當循以禮制斷以大義順乎人情顧乃以剛明英果之主操此濡忍不決之心徇小慈而稽大典其何以昭示臣庶而光垂史册乎臣在漕言漕謹補牘以聞伏乞蚤定吉期而臣因得飛軍糈以實上國蚤發運艘回空即七省軍士頌明主而祝萬年歡聲且雷動矣題為銓臣蔑旨擅權戀位修怨謹循職掌糾參以肅朝政并祈敕令停推三臣以俟論定以存台綱事疏臣惟皇上御極四十餘年於言官獻替雖罕採納而每遇批犯輒多優容惟觸權奧忤巨姦者其敗不旋踵其錮終身忠臣義士扼腕久矣謹按吏部尚書趙煥平生虧喪大節難以縷陳今營據要地結權璫而招黨與逐總憲而傾善良借事誅鋤凶險狠惡近日例推孫振基等三臣皆惡其異已一時芟盡此三臣者非有玷官常干清議而獲罪於皇上也特以議論異同居恆建白詞多與趙焕相觸犯焕恐終不利於已而急修嫌怨預為翦除以僥幸長竊銓柄耳例推一事烺烺明旨令科院從公擬議原是慎重之意而趙焕獨擅雌黃略無顧忌之心是焕之權尊於皇上也乃悻然以職掌為爭則吏部侍郎方從哲不由會推徑竇躐進此古今希見之事職掌之廢而銓部之羞也顧未聞敢爭執半語何其蓄縮於大臣而狠毒於小臣也鮑應鰲起廢謫籍清貞端謹薰蕕不同宜遭焕忌謂不當以祠部改銓似矣乃科推正閏自有往例任意轉移巧用猾手何其苛求於賢者而通融於所昵也世有江陵尚可焚疏賣兄人非瑾保何妨媚納固寵有科臣周永春亓詩教為之畫策何攻不克有司屬李養正郭士望為之布網何算弗周彼皆度皇上待大臣有禮不輕呵譴遂敢蔑明旨而弄威權逐異議以固爵位夫議論原有兩端雷同誠非國福在皇上尚容臣下盡言以參酌是非之衡在諸臣亦誰願因殿上之爭而自傷和氣趙焕不能擴大公以秉衡渙小羣而事主乃挑彼此之鬭以收一網借言路之岐以營三窟雖自恃羽翼堪耐彈抨恐公論久而澄清豪傑代將輩出雖有善畫三策者無能為煥效一籌矣例轉何足為三臣辱特台綱自此廢墜權姦自此縱橫長此不已將令言官俯首喪氣盡折而入於權門羞熙朝而譏青史臣台臣也豈能坐視台綱決裂默無一言以希全祿位哉伏乞皇上敕下九院九卿科道會議如果趙煥植黨擅權掃滅台規違旨報怨即立賜三臣仍入班行以褫姦謀而肅憲紀若臣所奏不實即將臣與三臣同罷以謝趙煥臣雖抱膝丘園有餘榮矣題為漕屬災重乞速定本折以便新漕事疏臣奉命巡漕幸藉皇上如天之福大小臣工協濟於下起納全完獲免阻凍矣顧臣今年之漕乃民間去嵗之米惟去年稍稔有司之徴收早故漕卒之轉運亦早若明年之漕則今年之米也此雖新漕臣為政乎而臣目擊江南漕屬地方若南直𨽻江西湖廣等處淫雨為祟洪水稽天見於彼處撫按之所敷奏僉謂數十年所未有業經户部陸續題覆大約不出緩逋留賑改折三端除帶徴錢糧及留稅備賑與苧布折色之類非關職掌不敢槩及外惟是漕例以十月開徴先期派單十二月兌完開行今十月杪矣該部所覆各省全折半改之數尚未即奉俞旨派者不敢派徴者不敢徴君門萬里小民引領望澤但見勘報疏上便喁喁然以為有折有蠲竟無完漕之心矣且被災地方野無青草室如懸磬或執技藝以糊口於四方或業樵漁度命於山澤朝不謀夕安能挾資鏹越他邦販本色以供牛車如往年江西等處鮮米率石價三錢今聞騰湧在六錢之上加以副米腳耗統而計之率官民米一石費價八九錢有竒改折利害之數不待持籌而自明也日下即亟頒恩旨著該部飛檄傳示已逾漕例兩月倘再遲延則漕數本折不定京通邊之數皆不能定各處被災地方漕司無所憑以發派單府縣無所稟以徴稅額豈不本折兩耽軍需大誤而明嵗轉運必倍費新臣拮據矣伏乞敕下户部先將災傷地方原題漕糧南糧各改折分數馬上差人傳檄以便派徴其餘蠲賑浩蕩之恩另候皇上漸次施行國計幸甚蒼生幸甚題為政柄旁落近習蔽明乞攬乾剛以新盛治事疏臣仰惟皇上臨御以來英明果毅一號一令悉稟裁奪自以為無太阿倒持魁罡失馭之病矣其實靜攝日久斧鬵彌深百凡庶政有漸流於下移而莫覺者夫蔽明之姦行於下而不韙之名歸吾君甚可痛也臣不敢瀆引謹以二三時事諸臣所焦舌而陳者申之近者賢令李嗣善蒙釋人人加額欣聲震地矣至若滿朝薦等救萬人之命功在嗣善上而梁永等戕萬人之命罪又浮於馮進朝乃釋纍之仁此已沾矣而彼猶不免與獄吏伍則以進朝及於寬政獲赦重辟故嗣善得與均宥而朝薦等獨居縲絏之中罪閹不付庭理是以恩綸垂渙而中寢也則三臣之長困於三木也蓋皇上之左右幽縶之也然而禁良令之名則皇上受之矣舊制駙馬統體甚隆今駙馬冉興讓以被辱逃蒙顯罰矣顧婦寺負辜未聞重創公主不能以保其夫天子不能以芘其女煬竈售姦其何疑焉是興讓之覆寃莫照也蓋皇上之左右壅抑之也然而辱戚臣之名則皇上受之矣今以四海之蓄加以礦稅之括入僅僅三殿箭樓耳久乖龍見之期纍年不得報竣豈土木不足供版築丁匠不足供驅使乎良由大工未竣墨胥家於是貪璫家於是稅使又幾幸以免掣而家於是乃别立一種忌諱邪説以默聳而逗遛是工役之不得早就輪奐也皇上之左右因此以為利也然而廢朝常之名則皇上受之矣放棄諸臣批鱗者不罪觸權者永錮竊規皇上原無成心第廢臣鯁直之性多為姦璫所恨在廷一二宵小圖報效於權門者又從而媒蘖焉是以有偽學之牘有説事之單大察有林下黨人之欵又慮台省中為之發憤而明其不然則先設依傍之名目以震懾之甚且造為蜚語曰考選時某人推轂某欲科即科欲道即道不惟布之道路且明告君父使人憂讒畏譏不敢昌言昭雪而護持正人者日益寡一任彼摧殘蹂躙莫敢誰何而後愈快又廣為之挑怨一切不得於輿評者皆歸其禍始於草野曰是某林下所搆害也如湯賔尹事未發時徐兆魁且預為之疏曰東林所以逆折賔尹者其迹已見諸如此類難以枚舉是以怨毒益騰而忌且怒之者日益衆護持既寡忌怒又衆即大小臣工虛心旁觀者漸至熒聽且咎諸賢之不隱鱗戢羽而為此孤憤也是以正勢漸孤又有姦人隂通於禁中安排謗訕而中止之是廢臣之不獲賜環也蓋皇上之左右挫遏而沉淪之也然而錮忠良之名則皇上受之矣此數者其事至不美叔季茍且之紕政非熙朝所宜見也皇上清夜思維必不願被此名而今皆冒而行之昭之臣庶垂之史册天下後世以皇上為何如主然實非皇上之本情由左右近習為搆鬬或於酣樂之餘為有心之蒙蔽以塞明或以間暇之際為無心之點掇以先入嵗月浸淫落其術中而不覺久之且習為故然矣伏乞皇上憬然發寤收攬乾剛於滿朝薦等釋之囹圄楊應吉梁盈女重加刑治大役立限報竣薖軸之英檢本章盡拔淹滯布列庶位此不過頃刻一轉念而叔季紕政變而為熙朝盛事天下後世稱英君誼辟必歸皇上矣臣一念朴忠忘其忌諱補牘陳言仰垂清覽臣不勝惶悚待命之至題為稅監剝民掯價戕殺生命事疏福建稅監髙寀素行貪殘甚於别璫歷年海商一切貴重美麗竒巧之珍百入於寀與參隨未必一貢於朝廷臣生長之地耳而目之久矣溪壑既盈虐聲久著不意益肆鴟張大開狼噬剋削閭閻殫膏竭髓皇上取用各行物料即一草一木莫不按數豫值而寀剡刳樓船連舸接舳揭百尺之帷檣窮雕飾之極麗所取物料槩欲白沒彼市鬻貿易之夫挾資何幾令一旦盡付烏有誰能甘之相率控取自無足怪何乃簡梟雄以作威陳利兵而相向揮刀戮二十餘人又放火延燒二十餘家越日披堅執鋭統率驍騎乘守衛之偶撤徑弄兵於轅門撫臣袁一驥節制一方寀不能遂其竭澤之貪夙懷忿憤按劍要挾副使李思誠僉事吕純如捋虎鬚以解厄寀復留而要盟皇上試思從來稅監最貪最狠最毒如髙淮梁永陳奉孫朝楊榮輩曾有殺人放火劫節鉞要留方面如寀之大逆不道者乎皇上利根未肯全撤釀成時事至此臣讀撫按疏揭參以鄉人見聞不覺髮指而繼之以痛哭也近者邢洪馳兵器於禁地盧受假狐威於票擬皆漫不處分今寀又見告矣所當亟行兩觀之誅用雪三山之忿非僅撤回墩鎖可以了事者臣聞省會人情洶洶莫不欲得寀而甘心焉賴巡方與在事諸臣安輯撫綏幸未告變臣恐防川不決決必滔天宿火不發發必燎原萬一戈矛起於肘腋海濵因而搖動倭夷乘以生心寀粉骨不足惜皇上豈善為社稷計乎寀之言曰多進孝順便可保全首領寀以纍年之括搜挾百萬蓋藏出其珍玩綺縠歌舞角抵享用作樂之剩資可以結左右之歡而及於寬政倘一遂其姦是皇上不惜太阿之重而僅易此阿堵也示之臣庶昭之史册虧纍令名豈淺鮮哉題為時政最急乞速俞用以舒輿情事疏邇來時政至吃緊而未快於人情者無如李瑾科印凌漢翀倉差兩事夫朝廷衆置官聫領文憑者出而展采候考選者入而紓丹今垣長久缺於彼縶垂行之足於此阻嚮用之心乃若視儲臺差寧獨供玉粒而實倉箱七省利病三軍命脈於是乎係今既滿者疲於積勞注差者稽於受事此二官者於本等名位非有躋崇陟膴之榮也而關皇上用人理財之務則綦大此二臣者即未蒙允用猶然瑣闥柏臺之重也而廢皇上之紀綱法度則已多諸臣亦既焦唇敝舌連篇纍牘以入告矣而天聽彌髙也求其故而不得咸責望於閣臣閣臣不能得咸歸罪於閹豎夫李瑾不嘗核工料而杜中涓之侵牟乎凌漢翀不嘗持三尺以撼寺人之凶焰乎此於陛下謀則忠於陛下之左右則拂二三用事之貂璫盡是同心之狐兔窺伺已熟煬竈成姦傕牘或未塵於宸覽俞綸乃忽越乎半年不然纍纍若若銜恩命而奉職業者未嘗終吝弗豫何獨靳此七品官也天下其孰能為皇上解乎蓋皇上雖英明天縱然與士大夫隔絶既久九閽崇邃中獨此輩朝夕密邇必有潛受其欺蔽而不及覺者此端一開將掃除之役漸至竊弄官爵之權唐宋宦官之害行伏見於今日矣職等不勝私憂過訃於是合詞奏請惟聖明少垂聽焉職等不勝激切待命之至題為蜀方物刀已竭藩國請求宜裁懇乞軫民瘼收明旨事疏臣聞天子不言有無諸侯不言多寡夫豈盡忘其有無多寡之心哉誠不敢括公賦為私積而欲藏殷富於百姓耳是以善為君者每作法於儉以昭子孫臣庶之則而君之善愛子者亦必範以禮義定以經制教之賤貨而尊讓逺利而尚亷以毋損令名臣接邸報見福王一本為比例懇乞賜給鹽井茶銀奉聖旨著查照潞王例行該部知道欽此臣竊歎福藩之拙於自謀陛下之薄於愛子也陛下以天下為家未有不保其民而保其子者福藩之所為邀恩寵而算錙銖者亦既不遺餘力而攘利矣猶覬及四川之鹽井乎試思今日四川如何景象乎播土征魂尚作春閨之夢建昌戍血復染瘴草之煙水西伏戎時露跋扈之形衆豕入笠每懷走壙之想蜀固羸國也天未厭禍焉又剝利以佐災無乃不可乎頃者皇太后遺詔蒙陛下推廣孝思加惠四海維時二三老臣曾蒞蜀者力陳鹽課之纍是以恩詔鹽井有課無井者著撫按官議豁蜀人方引領望澤而可頓壅德意乎夫陵谷尚遷徙無常鹽水歷幾時而盈竭異又歷幾時而醎淡異非永永濬於不涸之源也井敗課存竈户之賠納不堪相率棄業逃亡矣賦額且不能取盈􅉨􅉨派賠州縣以足京邊之需彼土之官自撫按而下莫不計露於捉襟而籌窮於借筯矣潞府之例舊稱難支福藩之富無容再益前者求開鹽厰今者復求鹽課長此不已意欲何極將扣之額徵之內乎抑增之額徴之外乎扣之則軍國餽餉之需嵗有常數不可虧縮也增之則巴蜀罷敝之餘倍算加緡又必不能輸應也況陛下聖子神孫振振方興今日引潞藩以為例他日必有引福藩以為例者陛下又將同之以槩為賜乎抑異之而靳其豫乎異之則等屬天潢之派未可厚薄視也同之則盡括惟正之供又未必足為宗室贍也臣竊謂福藩之規規此請也於殖貨則利於德義則愆陛下之沾沾此愛也於私情則牽於法制則違夫素約之家常有餘饒兼并之室日懼不給何者奢儉之致異也計福藩所入不為不厚矣以好善為樂則保有令名以節嗇為寶則永不乏匱陛下何不裁之以義教之以儉俾知國家有一定之賦分封無濫乞之規事必師古法以制情不以反汗為嫌收回成命則福藩沐皇上之慈愛更倍於錫豫之恩其為子孫黎民之利不亦溥乎臣又有請焉一人作法天下之則也涼貪之弊其應不爽陛下年來務鳩聚而廣誅求藩王象之又何責焉願皇上下明制遵太朴愛人力惜國用一切支討盡從削減竒珍異綵不為飾峻宇雕甍不為崇方物曲獻不為喜弛山澤之禁而為散財發粟之仁損貨利之私而為投珠抵璧之念行見風聲一倡臣庶景從天子不言有無而諸侯王敢於言多寡者未之有也此躬行之效身教之説陛下誠能俯採臣言翻然更始則薄海內外咸仰聖明育德於青宫者將習睹節用之規而消欲賄之萌況屏翰於列藩者其敢聽宵小之謀而恣無厭之請哉臣區區上陳不勝屏息待罪之至題為銓部職在知人官評要於核實事疏張光房等五人吏部詳於文單而置其圈點備於北員而虛其南額輕去奉旨之言官空懸急缺之風憲臣具疏糾駁非不知救者愈力忌者轉深吏部終持成心糚點當且朋出諸臣所謂愛之而實以害之良非虛語然衆論雖爾紛淆人品自有定價官秩不以冷要别五人之生平天下且以處置定吏部之當否即台臣劉光復亦云五臣未見端倪衆論過為揣度近太宰鄭繼之疏稱不願有單若有意於虛受者然摘出濮中玉考語册中有識暗行窒頗有怨聲兩言吏治以清端通明為最暗窒致怨斯誠有司之疵纇矣中玉既負此疵纇何以計典不黜幽巡方不白簡舊嵗咨訪不外推纍年吏部不覺察而令其得並與考選言官之列乎其或才善粉飾智工彌縫以有今日耶如此則真為不肖其或清直似欠員通執持鄰於任怨久而論定耶如此則未可謂非賢吏部以甄敘流品辨論官材為職者也不肖者以碔砆而混玉斯當與天下共棄之誰得曲而庇焉從前吏部且當追坐不察之罪若賢者以萋菲而鑠金當亟為湔雪以明其不然似未可抹截上下全文單摘出一二字面而盡置各撫按司道連篇纍牘清真之上考百千言於不道也總之人品之賢者不一有純瑜而無瑕者有似瑕而實瑜者不能察其真實之分又不究其毁摘之故其可輕相天下士而稱知人之哲乎吏部惟覆舉劾降調斥黜之疏可以單欵上聞今即欲改彼部曹豈宜輕置雌黃之口此一舉也職謂苛求於應别去留之日已非愛惜人才之意苛求於不應别去留之時益非保全善類之心繼之而非賢者則已如其賢者必有以受職言矣若辛亥以來韓敬科場覺發竒事疊出朝端紛紛多故彼此攻擊飛語欵單不絶於長安或張一以為百或憑虛以搆實重則遭撲滅輕則蒙繒繳大小臣工未易悉數極此不已世道何所底止伏乞陛下速下新考選諸臣以廣言路之益仍將張光房等速賜裁斷擬授以結目前之局世道幸甚題為摘陳漕河喫緊要務以禆國計事疏漕弊亟宜湔除莫過於陋規常例遞而下之武辨吸軍而軍吸民遞而上之軍奉武辨武辨奉各衙門諸役使費此其弊誠罄竹難書要之臣力所能制者臣得禁之臣力所不及制者賴在事諸臣共禁之不敢贅陳楮上以瀆聖覽惟事有最急而必仰賴天言之叮嚀者有二謹掇其樞要為皇上陳之其一曰治舟其一曰治水無舟則無漕無金錢則無舟清江厰積缺漕船不止千艘矣查據淮安府册開南京工部歲應解漕庫銀一萬八千餘兩無論逺者止以十載計之且欠七萬有竒矣此項銀取給蕪關船料倘使本關逋該部而該部逋漕猶可言也臣詢清江厰索查蕪關志歲徴解俱如額今漕帑窘匱極矣在别欵者猶宜酌盈濟虛況本項而容拖欠乎應將歷年挂欠銀兩發解補造舊缺即未能全完缺額亦可足七百艘之料事在燃眉同舟共濟計該部必不秦越視矣至於董造之官或專責本厰以畢役或如蘇松常鎮事例分任道府以效猷聽總漕另議請奪此治舟之説也兌糧在北幫者約千餘隻此不由閘可五六月竣事者也以南幫言漕規不有十二月過淮者乎淮離泇三百里可二十日達今泇必以三月濬完始啓閘也由閘約有八千艘窮一日力可過重運六十通漕積之必百四五十日乃竣已五閲月矣首幫入閘以三月尾幫入閘必以七月泇至壩亦須百餘日首幫抵壩以六七月則尾幫抵壩必以九十月此挨次相乘必然之勢也不有風雨灣泊乎不又有漂撈停閣乎一舟阻則一幫俱滯一幫阻則各幫皆滯況白河剝船多缺稍稍延緩轉眼便入冬序凍糧數十萬易易耳今應嚴為二月開泇之令泇河冬間挑濬約百日可完向者募邳睢桃宿滕嶧等州縣里甲民夫赴泇開挑近者數十里逺者離二三百里往返途程既稽時日又客夫無地住宿憚逺役如赴湯火於是爭出重費貼夫頭及賄督工官官之墨者率以賄脫之虛報名數十不得五之用而民間又稱疲敝所在怨讟臣查得泇河貧民食力於挽拽者趾相錯也已行淮徐兖東濟寧三道會議就泇河原額夫東直兩地共一千三百餘名後有泇工議就額夫著於沿河土著居民跨募應用不得慿信夫頭逺募各州縣里甲騷動各屬可以蘇民間之積纍可以活泇河之貧傭而又無往返之苦住宿之艱督工官易於稽查已經屬道呈詳有成畫矣但濬挑稍遲漕事便誤宜每嵗勒限於十一月初旬興工正月刻期集事二月務使通利行漕報巡漕御史督舟入泇有違限者分别議懲庶人心肅而諸艘蚤達漕規可復矣此治水之説也以上二説無竒而切於實用伏乞敕下工部亟為議覆咨行南京工部於節慎庫貯蕪關料銀查解漕司轉發勒限補造積缺船數將挑濬泇工咨行總理河臣分委嚴督務依今限開通正月末旬報完以禆利涉運務庶得早完而國計民生均有賴矣題為河道淤潰宜防河工疏築當飭事疏臣觀黃河徐邳一帶狼矢溝亘其北三山口繞其南決於北則水灌磨臍溝及周栁等湖溢衝泇直而運道阻三十九年狼矢決壩是已決於南則水射符離浸灌徐宿靈睢之間川陸連濤原隰通望甚則漲漫歸仁即不甚而決口斜分正道水落泇流徑瀉難以積蓄貓兒窩直口等處必致淺澀而運道亦滯四十年三山決口是已臣盱衡極慮竊求所為善後之䇿為皇上陳之聞之善為川者決之使導凡黃水旁溢於衝崩之地必蕩刷轉深而於故道必突生澱淤從有河患以來未之有改也今三山徒堵塞決口而正道淤土未濬上流宣泄不利勢必侵齧兩旁新堤土脆既力不能抵而徐靈地形卑窪又為水性所趨奈何不重潰也據淮徐道右參議袁應泰勘報韓壩應挑開故道淤土不過三里兼築掃臺創水衝刷功力不繁刻日可就此實為喫緊第一務則濬淤澱以通下流宜亟也遙縷格三堤捍障歸仁今三堤漸就磽薄蓋因先河臣曹時聘蘇莊太行之役糜用百萬盡移徐邳睢宿桃清之河銀為曹單蕭碭之用致迤南土堤纍嵗缺修凌夷坍塌蓋積漸以至於今矣倘值伏秋怒流長河激浪為患匪細豈可泄泄此時以貽萬一於異日則修遙縷以保歸仁宜亟也捧沙塞溜諺之所譏黃河多浮沙而少老土今夫役憚於揀取膠泥輒就便以沙土雜築一時雖漸纍髙遇流便復刷去宜擇認油泥河官先立標記然後挑用不得希圖省便雜用鬆沙查先年總河臣曾製鐵錐其鋭造為團圈於告完時巡行插取底土出驗分别功罰此法甚善則辨土以固堤根宜飭也調集丁夫萬室奔命置買物料行市傾資非有亷幹河員以綜理調劑其間不特虛冒欺蒙公私困匱而追呼凌厲科貼繁興衆口怨咨流離載道有甚洪水為災者後有缺員宜於濵河州縣擇其仁亷明幹者總河會撫按咨揭送部以充其選三年內有能先事預防臨事克濟又能綏輯窮民不致怨咨者優以殊擢若怠玩失事尅削侵漁者輕則斥逐重則拏問庶激勸行而人知鼓舞則揀賢能以充河員宜亟也蘇軾有言曰水官之利興河工猶邉臣之喜聞邊事臣訪沿河胥典徭作河少決則小利大決則大利蓋工額廣繁可恣包冒每遇封築外形非不繕完中實鬆脆未嘗竭力奮夯以求牢固幾幸旦夕有患以覬營為何者彼其自活之計必出於此也夫千仞之堤潰於蟻穴方易為力時不加料理及至水勢漨湧世界陸沉淖桑田而漂廬舍乃始議動大役搜竭帑銀以充浩費而竟莫奏負薪之效每留匏子之歌良可痛也此無他故失事之罰不嚴而先事之備不預也宜將各役董督處所按段勒名登之册案三年內若上流不漲而無故自決者罪無赦往者值伏秋時飭各夫常住鋪舍晝則鳴鑼巡視夜則擊柝傳籌一處破綻立刻傳集衆夫協力葺治又險要之區原各置有厰場貯樁木栁枝柴草繩檾等料以待急需宜申嚴舊制責令徭夫時時以各處單薄罅隙之狀上聞預加封培仍量動歲修銀買料貯厰卒有告急管河頭目傳聚衆夫用裹頭填築若有將決而失於預報又報決而物料不畢集鋪夫不齊到者罪無赦則嚴失事以絶姦玩預積備以防倉卒宜講也約而言之治河之䇿要不越疏與築古者疆理區甸不與水爭地度其所必趨而利導之故其疏也易今田廬城郭星羅棋布略無剩壤如徐邳間北控泇直南瞰歸仁惟中存一線通此急溜寧復别有可注之壑施疏決之功哉往者黃堌議留水口貽患全河繼之黃家壩議開分黃四十餘萬竟填巨壑以往事劵之疏之情形未易言矣臣所請復故道不過就本河稍決堆積挑澱淤耳䇿無竒而實切於利害所恃又全在牢其地腳厚其隄防以約束之使不旁泛臣又觀徐邳隄形髙並民舍湍與隄平無異以垣居水稍稍衝破傷殘無數逾歷數月尚未乾涸昔歐陽修言汴隄與居民簷廡相等力請開淘與增築並行今之徐邳何以異此乃若連興工作募役輸料嵗無寧日嗟此孑遺苦於水復苦於治水則於勞民時寓安集撫綏至意誠不可不亟圖也伏乞皇上省覽臣奏下采葑言於河事或小補而生靈亦永賴矣周忠愍奏疏卷上
