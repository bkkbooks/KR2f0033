body:
  text: 周忠愍奏疏詔令奏議類二奏議之屬提要臣等謹案周忠愍奏疏二卷明周起元撰起元字仲先號綿貞海澄人萬厯辛丑進士官至右僉都御史巡撫江南忤璫被害追贈兵部侍郎諡忠愍再諡忠惠事迹具明史本傳茲刻曰西臺奏疏共十一首為一卷乃擢湖廣道御史巡漕時所上曰撫吳奏疏共十九首為一卷乃巡撫江南時所上其第一卷所載皆起元之傳第四卷為蘭言録乃當時名賢題贈詩文第五卷為崇祀録皆厯官處建祠呈文及碑記後又録諸人贈祭詩文及起元遺詩七首蓋出其後裔搜輯傳雕隨時增入無復次第起元建言抗疏有關國計民生初非尋常尚氣節好攻擊者可比其人其言並足垂諸不朽固宜特録而傳之者今存其奏疏二卷以遺詩七首附之至起元名光史策初不藉傳志以傳今並從刪汰以省繁復焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4be53a1f6c80a250473192945137df5af7689f30de7e9dd4afd15a2c64c1737d
